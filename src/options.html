<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PagePalette</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <header>
      <div style="display: flex; justify-content: flex-end; width: 100%; margin-bottom: -1.5em; position: relative; z-index: 10;">
        <select id="langSelect" style="width: auto; padding: 6px; font-size: 0.85em; cursor: pointer; border: 1px solid var(--border-color); border-radius: 6px; background-color: var(--input-bg-color); color: var(--text-color);">
          <option value="auto">Auto (Browser)</option>
          <option value="en">English (en)</option>
          <option value="de">Deutsch (de)</option>
          <option value="es">Español (es)</option>
          <option value="fr">Français (fr)</option>
          <option value="ja">日本語 (ja)</option>
          <option value="pt_BR">Português (pt_BR)</option>
          <option value="zh_CN">中文 (zh_CN)</option>
        </select>
      </div>
      <h1 id="titleH1">PagePalette</h1>
      <p id="descText">Manage your custom CSS rules here.</p>
    </header>

    <main>
      <!-- List of existing rules -->
      <section id="rulesSection">
        <div class="rules-header">
          <h2 id="yourRulesTitle">Your Rules</h2>
          <div class="header-actions">
            <button id="importBtn" class="secondary-btn">Import JSON</button>
            <button id="exportBtn" class="secondary-btn">Export JSON</button>
            <button id="addNewBtn" class="primary-btn">+ Add New Rule</button>
          </div>
          <input type="file" id="importFile" accept=".json" class="hidden">
        </div>
        <div id="rulesList" class="rules-list">
          <!-- Rule cards will be injected here via JS -->
        </div>
      </section>

      <!-- Editor Panel (hidden by default) -->
      <section id="editorSection" class="hidden">
        <h2 id="editorTitle">Edit Rule</h2>
        
        <div class="form-group">
          <label for="ruleName" id="labelRuleName">Rule Name (Optional)</label>
          <input type="text" id="ruleName" placeholder="e.g. My Website Fix">
        </div>
        
        <div class="form-group">
          <label for="ruleRegex" id="labelRuleRegex">URL Regular Expression</label>
          <input type="text" id="ruleRegex" placeholder="e.g. .*example\.com.*">
          <small class="hint" id="hintRegex">This determines which websites this CSS will be injected into.</small>
        </div>
        
        <div class="form-group">
          <label for="ruleCss">Custom CSS</label>
          <textarea id="ruleCss" placeholder="body { background-color: #f0f0f0 !important; }"></textarea>
        </div>
        
        <div class="form-actions">
          <button id="saveRuleBtn" class="primary-btn">Save</button>
          <button id="cancelRuleBtn" class="secondary-btn">Cancel</button>
        </div>
      </section>
    <div id="toast" class="toast hidden">
      <span id="toastMessage"></span>
      <button id="toastUndoBtn" class="toast-undo-btn hidden">Undo</button>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
